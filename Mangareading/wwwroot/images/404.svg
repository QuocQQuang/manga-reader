<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Animation Definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6eeff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Floating animation -->
    <animate id="floatAnimation" attributeName="transform" attributeType="XML" type="translate"
      values="0,-3;0,3;0,-3" dur="4s" repeatCount="indefinite" />
      
    <!-- Blinking animation for stars -->
    <animate id="blinkAnimation" attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite" />
  </defs>
  
  <!-- Background with subtle gradient -->
  <rect width="600" height="400" fill="url(#bgGradient)" rx="15" ry="15" />
  
  <!-- Decorative manga-style elements -->
  <g id="decorativeElements">
    <!-- Speed lines -->
    <line x1="50" y1="50" x2="150" y2="30" stroke="#9BA4FF" stroke-width="2" stroke-opacity="0.3" />
    <line x1="550" y1="350" x2="450" y2="370" stroke="#9BA4FF" stroke-width="2" stroke-opacity="0.3" />
    <line x1="30" y1="200" x2="120" y2="220" stroke="#9BA4FF" stroke-width="2" stroke-opacity="0.3" />
    <line x1="570" y1="150" x2="480" y2="130" stroke="#9BA4FF" stroke-width="2" stroke-opacity="0.3" />
    
    <!-- Stars with animation -->
    <g>
      <path d="M520,80 l5,10 10,1.5 -7,7 1.5,10 -9.5,-5 -9.5,5 1.5,-10 -7,-7 10,-1.5 z" fill="#7B84E8" opacity="0.7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
      </path>
      <path d="M80,320 l4,8 8,1.2 -6,6 1.2,8 -7.2,-4 -7.2,4 1.2,-8 -6,-6 8,-1.2 z" fill="#7B84E8" opacity="0.7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
      </path>
      <path d="M150,50 l3,6 6,1 -4.5,4.5 1,6 -5.5,-3 -5.5,3 1,-6 -4.5,-4.5 6,-1 z" fill="#7B84E8" opacity="0.7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" />
      </path>
    </g>
  </g>
  
  <!-- 404 Text with shadows -->
  <g id="errorText">
    <text x="300" y="180" font-family="'Segoe UI', Roboto, Arial" font-size="130" font-weight="900" fill="#8C92F2" text-anchor="middle" letter-spacing="-2">404</text>
    <text x="303" y="183" font-family="'Segoe UI', Roboto, Arial" font-size="130" font-weight="900" fill="#5A61DE" text-anchor="middle" letter-spacing="-2">404</text>
  </g>
  
  <!-- Book/Manga Pages with animation -->
  <g transform="translate(300, 240)">
    <g>
      <!-- Left page -->
      <path d="M-60,-50 v100 h60 v-100 z" fill="#FFFFFF" stroke="#8C92F2" stroke-width="2" />
      <line x1="-40" y1="-30" x2="-10" y2="-30" stroke="#C4C9FF" stroke-width="2" />
      <line x1="-40" y1="-15" x2="-10" y2="-15" stroke="#C4C9FF" stroke-width="2" />
      <line x1="-40" y1="0" x2="-10" y2="0" stroke="#C4C9FF" stroke-width="2" />
      <line x1="-40" y1="15" x2="-10" y2="15" stroke="#C4C9FF" stroke-width="2" />
      <line x1="-40" y1="30" x2="-10" y2="30" stroke="#C4C9FF" stroke-width="2" />
      
      <!-- Right page -->
      <path d="M0,-50 v100 h60 v-100 z" fill="#FFFFFF" stroke="#8C92F2" stroke-width="2" />
      <line x1="10" y1="-30" x2="40" y2="-30" stroke="#C4C9FF" stroke-width="2" />
      <line x1="10" y1="-15" x2="40" y2="-15" stroke="#C4C9FF" stroke-width="2" />
      <line x1="10" y1="0" x2="40" y2="0" stroke="#C4C9FF" stroke-width="2" />
      <line x1="10" y1="15" x2="40" y2="15" stroke="#C4C9FF" stroke-width="2" />
      <line x1="10" y1="30" x2="40" y2="30" stroke="#C4C9FF" stroke-width="2" />
      
      <!-- Question mark for missing page -->
      <text x="0" y="15" font-family="'Segoe UI', Roboto, Arial" font-size="40" font-weight="bold" fill="#5A61DE" text-anchor="middle">?</text>
      
      <animateTransform attributeName="transform" type="translate" values="0,-3;0,3;0,-3" dur="4s" repeatCount="indefinite" />
    </g>
  </g>
  
  <!-- Error message with better typography -->
  <g id="errorMessage">
    <rect x="150" y="305" width="300" height="40" rx="20" ry="20" fill="#5A61DE" opacity="0.1" />
    <text x="300" y="330" font-family="'Segoe UI', Roboto, Arial" font-size="20" font-weight="500" fill="#343A40" text-anchor="middle">Trang không tìm thấy</text>
  </g>
</svg>
