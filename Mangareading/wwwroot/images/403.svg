<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Animation Definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffebeb;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shield pulse animation -->
    <animate id="pulseAnimation" attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
  </defs>
  
  <!-- Background with subtle gradient -->
  <rect width="600" height="400" fill="url(#bgGradient)" rx="15" ry="15" />
  
  <!-- Decorative manga-style elements -->
  <g id="decorativeElements">
    <!-- Speed lines -->
    <line x1="50" y1="50" x2="150" y2="30" stroke="#FFB1B1" stroke-width="2" stroke-opacity="0.3" />
    <line x1="550" y1="350" x2="450" y2="370" stroke="#FFB1B1" stroke-width="2" stroke-opacity="0.3" />
    <line x1="30" y1="200" x2="120" y2="220" stroke="#FFB1B1" stroke-width="2" stroke-opacity="0.3" />
    <line x1="570" y1="150" x2="480" y2="130" stroke="#FFB1B1" stroke-width="2" stroke-opacity="0.3" />
    
    <!-- Alert symbols -->
    <g>
      <path d="M520,80 l-6,-10 h12 z" fill="#E85C5C" opacity="0.7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
      </path>
      <path d="M80,320 l-5,-8 h10 z" fill="#E85C5C" opacity="0.7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
      </path>
      <path d="M150,50 l-4,-7 h8 z" fill="#E85C5C" opacity="0.7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" />
      </path>
    </g>
  </g>
  
  <!-- 403 Text with shadows -->
  <g id="errorText">
    <text x="300" y="180" font-family="'Segoe UI', Roboto, Arial" font-size="130" font-weight="900" fill="#FF9E9E" text-anchor="middle" letter-spacing="-2">403</text>
    <text x="303" y="183" font-family="'Segoe UI', Roboto, Arial" font-size="130" font-weight="900" fill="#E85C5C" text-anchor="middle" letter-spacing="-2">403</text>
  </g>
  
  <!-- Shield with lock icon with animation -->
  <g transform="translate(300, 240)">
    <g>
      <!-- Shield -->
      <path d="M0,-50 C-40,-40 -50,-20 -50,20 C-50,40 -20,60 0,70 C20,60 50,40 50,20 C50,-20 40,-40 0,-50 Z" fill="#FFFFFF" stroke="#E85C5C" stroke-width="3" />
      
      <!-- Lock body -->
      <rect x="-20" y="-10" width="40" height="35" rx="5" ry="5" fill="#E85C5C" />
      
      <!-- Lock shackle -->
      <path d="M-10,-10 C-10,-20 10,-20 10,-10" stroke="#E85C5C" stroke-width="6" stroke-linecap="round" fill="none" />
      
      <!-- Lock keyhole -->
      <circle cx="0" cy="5" r="5" fill="#FFFFFF" />
      <rect x="-1" y="5" width="2" height="7" fill="#FFFFFF" />
      
      <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="2s" repeatCount="indefinite" />
    </g>
  </g>
  
  <!-- Error message with better typography -->
  <g id="errorMessage">
    <rect x="150" y="305" width="300" height="40" rx="20" ry="20" fill="#E85C5C" opacity="0.1" />
    <text x="300" y="330" font-family="'Segoe UI', Roboto, Arial" font-size="20" font-weight="500" fill="#343A40" text-anchor="middle">Không có quyền truy cập</text>
  </g>
</svg>
