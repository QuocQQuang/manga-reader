<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Animation Definitions -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5e6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with subtle gradient -->
  <rect width="600" height="400" fill="url(#bgGradient)" rx="15" ry="15" />
  
  <!-- Decorative elements -->
  <g id="decorativeElements">
    <!-- Zigzag lines -->
    <path d="M50,50 l20,15 l-20,15 l20,15" stroke="#FFB366" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M550,350 l-20,-15 l20,-15 l-20,-15" stroke="#FFB366" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M30,200 l20,15 l-20,15 l20,15" stroke="#FFB366" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M570,150 l-20,-15 l20,-15 l-20,-15" stroke="#FFB366" stroke-width="2" stroke-opacity="0.3" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Warning symbols -->
    <g>
      <path d="M520,80 l-10,-10 l10,-10 l10,10 z" fill="#FF9E4D" opacity="0.7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
      </path>
      <path d="M80,320 l-8,-8 l8,-8 l8,8 z" fill="#FF9E4D" opacity="0.7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
      </path>
      <path d="M150,50 l-6,-6 l6,-6 l6,6 z" fill="#FF9E4D" opacity="0.7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" />
      </path>
    </g>
  </g>
  
  <!-- 400 Text with shadows -->
  <g id="errorText">
    <text x="300" y="180" font-family="'Segoe UI', Roboto, Arial" font-size="130" font-weight="900" fill="#FFBB7D" text-anchor="middle" letter-spacing="-2">400</text>
    <text x="303" y="183" font-family="'Segoe UI', Roboto, Arial" font-size="130" font-weight="900" fill="#FF9E4D" text-anchor="middle" letter-spacing="-2">400</text>
  </g>
  
  <!-- Broken chain links -->
  <g transform="translate(300, 240)">
    <g>
      <!-- Left link -->
      <path d="M-40,-20 a20,20 0 1,0 0,40 a20,20 0 1,0 0,-40 z" fill="none" stroke="#FF9E4D" stroke-width="6" />
      <path d="M-20,0 h10" stroke="#FF9E4D" stroke-width="6" stroke-linecap="round" />
      
      <!-- Break gap with animation -->
      <path d="M-5,-3 l10,6" stroke="#FF9E4D" stroke-width="2">
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite" />
      </path>
      <path d="M-5,3 l10,-6" stroke="#FF9E4D" stroke-width="2">
        <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite" />
      </path>
      
      <!-- Right link -->
      <path d="M40,-20 a20,20 0 1,0 0,40 a20,20 0 1,0 0,-40 z" fill="none" stroke="#FF9E4D" stroke-width="6" />
      <path d="M20,0 h-10" stroke="#FF9E4D" stroke-width="6" stroke-linecap="round" />
      
      <animateTransform attributeName="transform" type="rotate" values="-3;3;-3" dur="4s" repeatCount="indefinite" />
    </g>
  </g>
  
  <!-- Error message with better typography -->
  <g id="errorMessage">
    <rect x="150" y="305" width="300" height="40" rx="20" ry="20" fill="#FF9E4D" opacity="0.1" />
    <text x="300" y="330" font-family="'Segoe UI', Roboto, Arial" font-size="20" font-weight="500" fill="#343A40" text-anchor="middle">Yêu cầu không hợp lệ</text>
  </g>
</svg>
